spring.application.name=user-management

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (optional but useful)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging (optional)
logging.level.org.springframework.web=INFO

# Admin bootstrap (test setup)
app.bootstrap.admin.enabled=true
app.bootstrap.admin.full-name=System Administrator
app.bootstrap.admin.email=admin@example.com

# JWT config
app.jwt.issuer=user-management
# 256-bit+ secret recommended. For dev only; store securely in real systems.
app.jwt.secret=change-me-change-me-change-me-change-me-change-me-256bit
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=1209600

# LDAP (example defaults; set per environment)
app.ldap.enabled=false
app.ldap.urls=ldap://localhost:389
app.ldap.base-dn=dc=example,dc=com
app.ldap.bind-dn=cn=admin,dc=example,dc=com
app.ldap.bind-password=admin

# Where to search for users
app.ldap.user-search-base=ou=people
# Filter supports {0} = username, {1} = email
app.ldap.user-search-filter=(&(objectClass=person)(|(uid={0})(mail={1})))